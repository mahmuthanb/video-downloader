<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>VaultDL Helper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #18181b;
      color: #f4f4f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      width: 300px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .header {
      font-size: 15px;
      font-weight: 700;
      color: #60a5fa;
      letter-spacing: 0.02em;
    }
    .url-box {
      background: #27272a;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 11px;
      color: #a1a1aa;
      word-break: break-all;
      line-height: 1.5;
      max-height: 56px;
      overflow: hidden;
    }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.instagram { background: #7c3aed; color: #fff; }
    .badge.tiktok    { background: #18181b; color: #fff; border: 1px solid #52525b; }
    .badge.youtube   { background: #dc2626; color: #fff; }
    .badge.unsupported { background: #3f3f46; color: #a1a1aa; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #2563eb; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status {
      text-align: center;
      font-size: 12px;
      min-height: 16px;
    }
    #status.ok  { color: #34d399; }
    #status.err { color: #f87171; }
  </style>
</head>
<body>
  <div class="header">VaultDL Helper</div>
  <div class="url-box" id="urlBox">Yükleniyor...</div>
  <div><span class="badge" id="badge">—</span></div>
  <button id="addBtn">Kuyruğa Ekle</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
